    <div id="settings-screen">
      <div class="settings-card">
        <h1>Color Sort</h1>
        <div class="setting-group">
          <label>色の数: <span id="color-count-display">4</span> 色</label>
          <div class="slider-row">
            <span class="slider-limit">3</span>
            <input type="range" id="color-count" min="3" max="6" value="4" step="1" />
            <span class="slider-limit">6</span>
          </div>
        </div>
        <div class="setting-group">
          <label>空きチューブ: <span id="extra-tubes-display">2</span> 本</label>
          <div class="slider-row">
            <span class="slider-limit">1</span>
            <input type="range" id="extra-tubes" min="1" max="3" value="2" step="1" />
            <span class="slider-limit">3</span>
          </div>
        </div>
        <button id="start-btn">ゲームスタート</button>
      </div>
    </div>

    <div id="game-screen">
      <div id="hud" class="hud-bar">
        <div id="moves-display" class="hud-pill">手数: 0</div>
        <button id="restart-btn" class="hud-button">設定に戻る</button>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="result-overlay">
        <div class="result-card">
          <h2 id="result-title">クリア！</h2>
          <div class="score-big" id="result-score">0</div>
          <p id="result-moves-text">手数: <span id="result-moves">0</span></p>
          <div class="btn-group">
            <button id="retry-btn">もう一度</button>
            <button id="back-btn">設定に戻る</button>
          </div>
        </div>
      </div>
    </div>

    <script src="nav.js"></script>
    <script src="3DGames/SortGame/constants.js"></script>
    <script src="3DGames/SortGame/model.js"></script>
    <script src="3DGames/SortGame/view.js"></script>
    <script src="3DGames/SortGame/controller.js"></script>
