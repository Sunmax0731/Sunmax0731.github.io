    <div id="settings-screen">
      <div class="settings-card">
        <h1>Life Game</h1>

        <div class="setting-group">
          <label>モード</label>
          <div class="mode-toggle">
            <button type="button" class="mode-btn dim-btn active" data-dim="2d">2D</button>
            <button type="button" class="mode-btn dim-btn" data-dim="3d">3D</button>
          </div>
        </div>

        <div class="setting-group">
          <label>グリッドサイズ</label>
          <div class="mode-toggle">
            <button type="button" class="mode-btn size-btn" data-size="small">小</button>
            <button type="button" class="mode-btn size-btn active" data-size="medium">中</button>
            <button type="button" class="mode-btn size-btn" data-size="large">大</button>
          </div>
          <p class="diff-desc" id="size-desc"></p>
        </div>

        <div class="setting-group">
          <label>速度</label>
          <div class="mode-toggle">
            <button type="button" class="mode-btn speed-btn" data-speed="slow">ゆっくり</button>
            <button type="button" class="mode-btn speed-btn active" data-speed="normal">ふつう</button>
            <button type="button" class="mode-btn speed-btn" data-speed="fast">はやい</button>
            <button type="button" class="mode-btn speed-btn" data-speed="turbo">最速</button>
          </div>
        </div>

        <div class="setting-group">
          <label>初期パターン</label>
          <div class="mode-toggle">
            <button type="button" class="mode-btn pattern-btn active" data-pattern="random">ランダム</button>
            <button type="button" class="mode-btn pattern-btn" data-pattern="glider">グライダー</button>
            <button type="button" class="mode-btn pattern-btn" data-pattern="blank">空白</button>
          </div>
        </div>

        <div class="how-to-play">
          <p>クリック / ドラッグでセルを編集できます。</p>
          <p>再生、一時停止、ステップ実行を切り替えられます。</p>
          <p>ランダム配置とクリアも利用できます。</p>
        </div>

        <button id="start-btn">ゲームスタート</button>
      </div>
    </div>

    <div id="game-screen">
      <div id="hud">
        <div id="gen-display">世代: 0</div>
        <div id="pop-display">生存: 0</div>
        <div id="controls">
          <button id="play-pause-btn" title="再生 / 一時停止">▶</button>
          <button id="step-btn" title="1ステップ進める">⏭</button>
          <button id="random-btn" title="ランダム">⟳</button>
          <button id="clear-btn" title="クリア">✕</button>
        </div>
        <button id="back-btn">設定に戻る</button>
      </div>
      <canvas id="game-canvas"></canvas>
    </div>
