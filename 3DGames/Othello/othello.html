    <div class="screen" id="screen-settings">
      <div class="settings-card">
        <h1>オセロ</h1>
        <p class="settings-subtitle">CPU 対戦 / 2D・3D 切り替え対応</p>

        <div class="setting-group">
          <label>CPU の難易度</label>
          <div class="mode-toggle">
            <button class="mode-btn active" data-diff="easy">やさしい</button>
            <button class="mode-btn" data-diff="normal">ふつう</button>
            <button class="mode-btn" data-diff="hard">むずかしい</button>
          </div>
        </div>

        <div class="setting-group">
          <label>モード</label>
          <div class="mode-toggle">
            <button class="mode-btn active" data-mode="2d">2D</button>
            <button class="mode-btn" data-mode="3d">3D</button>
          </div>
        </div>

        <button id="start-btn">ゲームスタート</button>
      </div>
    </div>

    <div class="screen hidden" id="screen-coin">
      <div class="coin-scene">
        <p class="coin-title" id="coin-title">コインを投げて先手後手を決めます</p>
        <div class="coin-wrapper">
          <div class="coin" id="coin">
            <div class="coin-face omote"><span class="coin-kanji">表</span><span class="coin-sub">先手</span></div>
            <div class="coin-face ura"><span class="coin-kanji">裏</span><span class="coin-sub">後手</span></div>
          </div>
        </div>
        <div class="coin-result" id="coin-result"></div>
      </div>
    </div>

    <div class="screen hidden" id="screen-game">
      <div class="game-container">
        <div class="scoreboard">
          <div class="score-half" id="score-black-half">
            <div class="score-disc black"></div>
            <div class="score-num" id="score-black">2</div>
          </div>
          <div class="score-sep"></div>
          <div class="score-half" id="score-white-half">
            <div class="score-disc white"></div>
            <div class="score-num" id="score-white">2</div>
          </div>
        </div>

        <div class="info-row">
          <div class="turn-banner player" id="turn-banner">あなたのターン</div>
          <span class="diff-badge" id="diff-badge">やさしい</span>
        </div>

        <div class="board-wrap">
          <div id="board"></div>
          <canvas id="board-3d" style="display: none"></canvas>
          <div id="overlay">
            <div class="overlay-box">
              <div class="overlay-title">ゲーム終了</div>
              <div class="overlay-score" id="overlay-score"></div>
              <div class="overlay-winner" id="overlay-winner"></div>
              <button class="replay-btn" id="btn-replay">もう一度プレイ</button>
            </div>
          </div>
        </div>

        <div class="game-footer">
          <button class="back-btn" id="btn-back">設定に戻る</button>
        </div>
      </div>
    </div>
