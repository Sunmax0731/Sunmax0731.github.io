    <div id="settings-screen"><div class="settings-card"><h1>SameGame 3D</h1><div class="setting-group"><label>色の数: <span id="color-count-display">5</span> 色</label><input type="range" id="color-count" min="4" max="10" value="5" step="1" /><div class="color-preview" id="color-preview"></div></div><div class="setting-group"><label>ゲームモード</label><div class="mode-toggle"><button type="button" id="mode-2d-btn" class="mode-btn active">2D</button><button type="button" id="mode-3d-btn" class="mode-btn">3D</button></div></div><div class="setting-group" id="depth-group" style="display: none"><label>奥行きブロック数: <span id="board-depth-display">3</span> 層</label><div class="slider-row"><span class="slider-limit">2</span><input type="range" id="board-depth" min="2" max="6" value="3" step="1" /><span class="slider-limit">6</span></div></div><div class="setting-group"><label>横のブロック数: <span id="board-width-display">10</span> 列</label><div class="slider-row"><span class="slider-limit">5</span><input type="range" id="board-width" min="5" max="20" value="10" step="1" /><span class="slider-limit">20</span></div></div><div class="setting-group"><label>縦のブロック数: <span id="board-height-display">10</span> 行</label><div class="slider-row"><span class="slider-limit">5</span><input type="range" id="board-height" min="5" max="20" value="10" step="1" /><span class="slider-limit">20</span></div></div><button id="start-btn">ゲームスタート</button></div></div>
