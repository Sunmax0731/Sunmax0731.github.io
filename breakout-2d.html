    <div id="settings-screen">
      <div class="settings-card">
        <h1>Block Breaker</h1>
        <div class="setting-group">
          <label>難易度</label>
          <div class="mode-toggle">
            <button type="button" class="mode-btn" data-diff="easy">やさしい</button>
            <button type="button" class="mode-btn active" data-diff="normal">ふつう</button>
            <button type="button" class="mode-btn" data-diff="hard">むずかしい</button>
          </div>
          <p class="diff-desc" id="diff-desc"></p>
        </div>
        <div class="setting-group">
          <label>モード</label>
          <div class="mode-toggle">
            <button type="button" class="mode-btn active" data-mode="2d">2D</button>
            <button type="button" class="mode-btn" data-mode="3d">3D</button>
          </div>
        </div>
        <div class="setting-group" id="layer-group" style="display: none">
          <label>3D レイヤー数: <span id="layer-label">2</span></label>
          <input type="range" id="layer-count" min="2" max="4" step="1" value="2" />
        </div>
        <button id="start-btn">ゲームスタート</button>
      </div>
    </div>
    <div id="game-screen">
      <div id="hud">
        <div id="score-display">スコア: 0</div>
        <div id="lives-display">❤❤❤</div>
        <div id="powerup-display" style="display: none"></div>
        <button id="restart-btn">設定に戻る</button>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="game-over-overlay">
        <div class="game-over-card">
          <h2 id="result-title">ゲームオーバー</h2>
          <p>スコア: <span id="final-score">0</span></p>
          <div class="btn-group">
            <button id="retry-btn">もう一度</button>
            <button id="back-btn">設定に戻る</button>
          </div>
        </div>
      </div>
    </div>
    <script src="nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
